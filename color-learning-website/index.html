<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Home — Color Learning</title>
    <link rel="stylesheet" href="css/variables.css" />
    <link rel="stylesheet" href="css/main.css" />
    <link rel="stylesheet" href="css/layout.css" />
    <link rel="stylesheet" href="css/pages/homepage.css" />
  </head>
  <body>
    <header class="site-header" role="banner">
      <div id="site-navbar" aria-live="polite"></div>
    </header>

    <main id="main-content" class="page-home">
      <section class="home-hero" aria-label="Intro banner">
        <p class="home-hero__tagline">Explore the world of colors!</p>
      </section>

      <section class="home-row home-row--2" aria-label="Learn and test">
        <a class="home-card" href="learning.html" aria-label="Go to Learn">
          <p class="home-card__text">learn</p>
        </a>
        <a class="home-card home-card--test-spotlight" href="test.html" data-home-test-link aria-label="Open random test question">
          <div class="home-test__head">
            <p class="home-test__kicker">Color Challenge</p>
            <p class="home-card__text home-card__text--test">🔥 Can you solve this?</p>
          </div>
          <p class="home-test__prompt" data-home-test-prompt>Loading a random question...</p>
          <div class="home-test__options" data-home-test-options aria-label="Question options"></div>
          <p class="home-test__meta" data-home-test-meta>Preparing quiz route</p>
        </a>
      </section>

      <section class="home-row home-row--3" aria-label="Game and community">
        <a class="home-card home-card--game-spotlight" href="game.html" data-home-game-link aria-label="Start your color challenge in Game">
          <p class="home-card__text home-card__text--game">Start your color challenge!</p>
          <canvas
            class="home-game-preview"
            data-home-game-preview
            width="280"
            height="200"
            aria-label="Random game drawing preview"
          ></canvas>
        </a>
        <a class="home-card" href="community.html" aria-label="Go to Community">
          <p class="home-card__text">community</p>
        </a>
      </section>
    </main>

    <footer class="site-footer" role="contentinfo">
      <div id="site-footer"></div>
    </footer>

    <script src="js/theme.js" defer></script>
    <script src="js/main.js" defer></script>
    <script src="js/navbar.js" defer></script>
    <script src="js/auth.js" defer></script>
    <script src="js/pages/homepage.js" defer></script>
  </body>
</html>
